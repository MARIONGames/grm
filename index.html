<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Installer</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e293b,#0f172a);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.container{
    text-align:center;
    color:white;
}

h1{
    margin-bottom:20px;

.download-btn{

.download-btn:hover{
    background:#2563eb;
    transform:scale(1.05);
}
</style>

</head>
<body>

<div class="container">
    <h1>Download Our Installer</h1>
    
    <a href="installer.exe" download class="download-btn">
        Download Installer
    </a>

</html>
